<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Nueva Sesión</title>
    <link rel="stylesheet" href="registro-turno.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="registro-turno-body">

    <div class="registro-turno">
        
        <header class="registro-turno__cabecera">
            <h2 class="registro-turno__titulo">Detalles de la cita</h2>
            <p class="registro-turno__subtitulo">Completa los datos para reservar un bloque en tu calendario.</p>
        </header>

        <form id="formulario-cita" class="registro-turno__formulario">
            
            <div class="registro-turno__campo">
                <label class="registro-turno__label">Paciente <span class="registro-turno__asterisco">*</span></label>
                
                <div class="registro-turno__fila-paciente">
                    <div class="registro-turno__input-wrapper registro-turno__input-wrapper--expandido">
                        
                        <svg class="registro-turno__icono registro-turno__icono-izq icono-trazo" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16.6667 17.5V15.8333C16.6667 14.9493 16.3155 14.1014 15.6904 13.4763C15.0653 12.8512 14.2174 12.5 13.3334 12.5H6.66671C5.78265 12.5 4.93481 12.8512 4.30968 13.4763C3.68456 14.1014 3.33337 14.9493 3.33337 15.8333V17.5" />
                            <path d="M9.99996 9.16667C11.8409 9.16667 13.3333 7.67428 13.3333 5.83333C13.3333 3.99238 11.8409 2.5 9.99996 2.5C8.15901 2.5 6.66663 3.99238 6.66663 5.83333C6.66663 7.67428 8.15901 9.16667 9.99996 9.16667Z" />
                        </svg>

                        <select id="select-paciente" class="registro-turno__input registro-turno__input--doble-icono">
                            <option value="">Buscar y seleccionar paciente...</option>

                            <option value="paciente_001">Jeanpol</option>
                            <option value="paciente_002">Henrry</option>
                            <option value="paciente_003">Enzo</option>
                        </select>

                        <svg class="registro-turno__icono registro-turno__icono-der icono-trazo" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 7.5L10 12.5L15 7.5" />
                        </svg>
                    </div>

                    <button type="button" class="btn btn--secundario">
                        <svg class="registro-turno__icono-btn icono-trazo-btn" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 3.33325V12.6666" />
                            <path d="M3.33331 8H12.6666" />
                        </svg>
                        Nuevo
                    </button>
                </div>
            </div>

            <div class="registro-turno__cuadricula">
                
                <div class="registro-turno__campo">
                    <label class="registro-turno__label">Fecha de la sesión <span class="registro-turno__asterisco">*</span></label>
                    <div class="registro-turno__input-wrapper">
                        <input type="text" id="input-fecha" class="registro-turno__input registro-turno__input--icono-der" placeholder="dd/mm/aaaa">
                        
                        <svg class="registro-turno__icono registro-turno__icono-der icono-relleno" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 3.875H14.375V2.625H13.125V3.875H6.875V2.625H5.625V3.875H5C4.3125 3.875 3.75 4.4375 3.75 5.125V15.125C3.75 15.8125 4.3125 16.375 5 16.375H15C15.6875 16.375 16.25 15.8125 16.25 15.125V5.125C16.25 4.4375 15.6875 3.875 15 3.875ZM15 15.125H5V7H15V15.125Z" />
                        </svg>
                    </div>
                </div>

                <div class="registro-turno__columna-horas">
                    <div class="registro-turno__campo">
                        <label class="registro-turno__label">Hora de inicio <span class="registro-turno__asterisco">*</span></label>
                        <div class="registro-turno__input-wrapper">
                            <input type="text" id="input-hora-inicio" value="10:00" class="registro-turno__input registro-turno__input--icono-der">
                            
                            <svg class="registro-turno__icono registro-turno__icono-der icono-relleno" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.393 4.3999C7.52902 4.3999 4.40002 7.5359 4.40002 11.3999C4.40002 15.2639 7.52902 18.3999 11.393 18.3999C15.264 18.3999 18.4 15.2639 18.4 11.3999C18.4 7.5359 15.264 4.3999 11.393 4.3999ZM11.4 16.9999C8.30602 16.9999 5.80002 14.4939 5.80002 11.3999C5.80002 8.3059 8.30602 5.7999 11.4 5.7999C14.494 5.7999 17 8.3059 17 11.3999C17 14.4939 14.494 16.9999 11.4 16.9999Z" />
                                <path d="M11.75 7.8999H10.7V12.0999L14.375 14.3049L14.9 13.4439L11.75 11.5749V7.8999Z" />
                            </svg>
                        </div>
                    </div>

                    <div class="registro-turno__campo">
                        <label class="registro-turno__label">Hora de finalización <span class="registro-turno__asterisco">*</span></label>
                        <div class="registro-turno__input-wrapper">
                            <input type="text" id="input-hora-fin" value="11:00" class="registro-turno__input registro-turno__input--icono-der">
                            
                            <svg class="registro-turno__icono registro-turno__icono-der icono-relleno" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.393 4.3999C7.52902 4.3999 4.40002 7.5359 4.40002 11.3999C4.40002 15.2639 7.52902 18.3999 11.393 18.3999C15.264 18.3999 18.4 15.2639 18.4 11.3999C18.4 7.5359 15.264 4.3999 11.393 4.3999ZM11.4 16.9999C8.30602 16.9999 5.80002 14.4939 5.80002 11.3999C5.80002 8.3059 8.30602 5.7999 11.4 5.7999C14.494 5.7999 17 8.3059 17 11.3999C17 14.4939 14.494 16.9999 11.4 16.9999Z" />
                                <path d="M11.75 7.8999H10.7V12.0999L14.375 14.3049L14.9 13.4439L11.75 11.5749V7.8999Z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="registro-turno__acciones">
                <button type="button" id="btn-cancelar" class="btn btn--cancelar">Cancelar</button>
                <button type="submit" id="btn-agendar" class="btn btn--primario">Agendar Sesión</button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <script src="registro-turno.js"></script>
</body>
</html>
