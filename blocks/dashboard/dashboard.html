<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Gestión psicológica</title>
    
    <link rel="stylesheet" href="dashboard.css">
    
    <script src="../../assets/libs/tailwindcss.js"></script>
    
    <script src="../../assets/libs/lucide.js"></script>
    
    <script src="../../assets/libs/fullcalendar.js"></script>

</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col gap-4 shrink-0">
        <div class="flex items-center gap-3 mb-6">

            <span class="font-bold text-lg tracking-tight">Psicólogo</span>
        </div>

        <nav class="flex flex-col gap-2">
            <button class="bg-gray-100 text-gray-900 p-3 rounded-xl font-semibold text-left flex items-center gap-3 transition-all">
                <i data-lucide="calendar" class="w-5 h-5"></i> Mi agenda
            </button>
            <button class="text-gray-500 hover:bg-gray-50 p-3 rounded-xl font-medium text-left flex items-center gap-3 transition-all">
                <i data-lucide="users" class="w-5 h-5"></i> Pacientes
            </button>
            <button class="text-gray-500 hover:bg-gray-50 p-3 rounded-xl font-medium text-left flex items-center gap-3 transition-all">
                <i data-lucide="archive" class="w-5 h-5"></i> Historial
            </button>
        </nav>


    </aside>

    <main class="flex-1 p-8 flex flex-col h-full overflow-hidden">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Agenda semanal</h1>
                <p class="text-gray-500">Gestiona tus citas y sesiones de hoy</p>
            </div>
            <button class="bg-gray-900 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-gray-800 transition-all flex items-center gap-2 shadow-sm">
                <i data-lucide="plus" class="w-5 h-5"></i> Nueva sesión
            </button>
        </header>

        <div class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative">
            <div id="calendario" class="absolute inset-6"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
    
    <script type="module" src="dashboard.js"></script>
</body>
</html>
